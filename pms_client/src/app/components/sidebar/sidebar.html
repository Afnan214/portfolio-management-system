<aside
  class="z-40 flex h-screen flex-col bg-white shadow-sm transition-all duration-300 border-r border-slate-100 flex-shrink-0"
  [class.w-64]="!collapsed" [class.w-20]="collapsed">
  <!-- Logo -->
  <div class="flex h-16 items-center gap-3 border-b border-slate-100 px-5" routerLink="/">
    <span class="text-xl font-bold text-green-500">M</span>
    @if (!collapsed) {
    <span class="text-lg font-semibold text-slate-800">Moonland</span>
    }
  </div>

  <!-- Nav Items -->
  <nav class="mt-4 flex flex-1 flex-col gap-1 px-3">
    @for (item of navItems; track item.label) {
    <a [routerLink]="item.route" routerLinkActive="bg-green-50 text-green-600"
      [routerLinkActiveOptions]="{ exact: item.route === 'console/dashboard' }"
      class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-500 transition-colors hover:bg-slate-50 hover:text-slate-700"
      [class.justify-center]="collapsed" [title]="collapsed ? item.label : ''">
      <lucide-icon [img]="item.icon" [size]="20" class="shrink-0"></lucide-icon>
      @if (!collapsed) {
      <span>{{ item.label }}</span>
      }
    </a>
    }
  </nav>

  <!-- Collapse Toggle -->
  <div class="border-t border-slate-100 p-3">
    <button (click)="toggleCollapse()"
      class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-400 transition-colors hover:bg-slate-50 hover:text-slate-600"
      [class.justify-center]="collapsed">
      <lucide-icon [img]="collapsed ? ChevronRight : ChevronLeft" [size]="20" class="shrink-0"></lucide-icon>
      @if (!collapsed) {
      <span>Collapse</span>
      }
    </button>
  </div>
</aside>
