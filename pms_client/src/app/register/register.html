<div class="hero bg-base-300 min-h-screen">
  <div class="hero-content flex-col lg:flex-row-reverse">

    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">First Name</label>
          <input type="firstName" class="input" placeholder="Jason" [(ngModel)]="formData.firstName" />
          <label class="label">Last Name</label>
          <input type="lastName" class="input" placeholder="Doe" [(ngModel)]="formData.lastName" />
          <label class="label">Email</label>
          <input type="email" class="input" placeholder="JasonDoe21@gmail.com" [(ngModel)]="formData.email" />
          <label class="label">Password</label>
          <input type="password" class="input" placeholder="********" [(ngModel)]="formData.password" />
          <div><a class="link link-hover">Forgot password?</a></div>

          <button class="btn btn-neutral mt-4" (click)="onSubmit()">{{isSubmitting?'Submitting':'Register'}}</button>
        </fieldset>
      </div>
    </div>
  </div>
</div>
