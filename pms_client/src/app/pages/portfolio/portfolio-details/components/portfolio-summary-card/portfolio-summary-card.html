<div class="rounded-2xl border border-base-300 bg-base-100 p-6 shadow-sm">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Portfolio</p>
      <h1 class="mt-1 text-3xl font-semibold text-slate-900">{{ portfolio.name }}</h1>
      <p class="mt-2 text-sm text-slate-500">
        Manage positions, review balances, and place trades quickly.
      </p>
    </div>

    @if (portfolio.isDefault) {
      <span class="rounded-full bg-primary/10 px-3 py-1 text-xs font-semibold text-primary">
        Default
      </span>
    }
  </div>

  <div class="mt-6 grid gap-4 sm:grid-cols-3">
    <div class="rounded-xl border border-base-300 bg-base-100 p-4">
      <p class="text-xs font-medium uppercase tracking-wide text-slate-400">Portfolio ID</p>
      <p class="mt-2 text-lg font-semibold text-slate-800">{{ portfolio.id }}</p>
    </div>

    <div class="rounded-xl border border-base-300 bg-base-100 p-4">
      <p class="text-xs font-medium uppercase tracking-wide text-slate-400">Cash Balance</p>
      <p class="mt-2 text-lg font-semibold text-slate-800">{{ portfolio.cashBalance | currency }}</p>
    </div>

    <div class="rounded-xl border border-base-300 bg-base-100 p-4">
      <p class="text-xs font-medium uppercase tracking-wide text-slate-400">Status</p>
      <p class="mt-2 text-lg font-semibold text-slate-800">
        {{ portfolio.isDefault ? 'Primary Portfolio' : 'Active Portfolio' }}
      </p>
    </div>
  </div>
</div>
